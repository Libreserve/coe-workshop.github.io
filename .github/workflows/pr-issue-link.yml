name: PR ↔ Issue Auto-Link

on:
  pull_request:
    types: [opened, edited, closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - name: Link PR to issues
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request?.body || "";
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;
            const prTitle = context.payload.pull_request.title;
            const action = context.payload.action;
            const isMerged = context.payload.pull_request.merged || false;
            const { owner, repo } = context.repo;

            // Find linked issues: Closes #123, Fixes #456, Resolves #789, แก้ #111
            const issueRefs = new Set();
            const patterns = [
              /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved|แก้)\s+(?:#|https:\/\/github\.com\/[^\/]+\/[^\/]+\/issues\/)(\d+)/gi,
              /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved|แก้)\s+\[?#(\d+)\]?/gi,
            ];

            for (const pattern of patterns) {
              let match;
              while ((match = pattern.exec(prBody)) !== null) {
                issueRefs.add(parseInt(match[1], 10));
              }
            }

            if (issueRefs.size === 0) {
              console.log("ℹ️  No linked issues found in PR body");
              return;
            }

            console.log(`🔗 Found linked issues: ${[...issueRefs].map(n => `#${n}`).join(", ")}`);

            for (const issueNumber of issueRefs) {
              try {
                // Verify issue exists
                await github.rest.issues.get({ owner, repo, issue_number: issueNumber });

                if (action === "closed" && isMerged) {
                  // ── PR merged → close issue ──
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: "status:in-progress" }); } catch (e) {}
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: "status:needs-triage" }); } catch (e) {}

                  await github.rest.issues.update({
                    owner, repo, issue_number: issueNumber,
                    state: "closed",
                    state_reason: "completed",
                  });

                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issueNumber,
                    body: `✅ แก้ไขแล้วใน [PR #${prNumber}](${prUrl}) — ปิดโดยอัตโนมัติ\n> ${prTitle}`,
                  });

                  console.log(`✅ Closed issue #${issueNumber}`);

                } else if (action === "closed" && !isMerged) {
                  // ── PR closed without merge → return to backlog ──
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: "status:in-progress" }); } catch (e) {}

                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: issueNumber,
                    labels: ["status:ready"],
                  });

                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issueNumber,
                    body: `↩️ [PR #${prNumber}](${prUrl}) ถูกปิดโดยไม่ได้ merge — issue กลับสู่ backlog`,
                  });

                  console.log(`↩️  Issue #${issueNumber} returned to backlog`);

                } else {
                  // ── PR opened/edited → mark in-progress ──
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: "status:needs-triage" }); } catch (e) {}
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: "status:ready" }); } catch (e) {}
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: "status:stale" }); } catch (e) {}

                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: issueNumber,
                    labels: ["status:in-progress"],
                  });

                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issueNumber,
                    body: `🔗 กำลังดำเนินการใน [PR #${prNumber}](${prUrl})\n> ${prTitle}`,
                  });

                  console.log(`🔗 Marked issue #${issueNumber} as in-progress`);
                }
              } catch (err) {
                if (err.status === 404) {
                  console.log(`⚠️  Issue #${issueNumber} not found — skipping`);
                } else {
                  console.log(`❌ Error processing #${issueNumber}: ${err.message}`);
                }
              }
            }
