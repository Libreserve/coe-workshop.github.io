name: Issue Checkbox Actions

# Turns the checkbox in the triage bot comment into a one-click "button".
# Ticking "🌿 สร้าง branch" (a [ ] -> [x] transition) creates the task
# branch, assigns the clicker, flips status to in-progress, and replies
# with the checkout command. Commits then trigger auto-pr.yml.

on:
  issue_comment:
    types: [edited]

permissions:
  issues: write
  contents: write

jobs:
  act:
    runs-on: ubuntu-latest
    # Only react to edits a human makes to the triage bot's OWN comment.
    # When this job edits the comment itself, sender becomes the bot → skipped.
    if: >-
      github.event.comment.user.login == 'github-actions[bot]' &&
      github.event.sender.type == 'User' &&
      !github.event.issue.pull_request
    steps:
      - name: Handle checkbox transition
        uses: actions/github-script@v7
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const body = context.payload.comment.body || "";
            const prev = context.payload.changes?.body?.from || "";

            // Did a checkbox carrying `marker` just go from [ ] to [x]?
            function justChecked(marker) {
              const re = new RegExp(`- \\[([ xX])\\][^\\n]*${marker}`);
              const now = body.match(re);
              const old = prev.match(re);
              const on = m => m && /[xX]/.test(m[1]);
              return on(now) && !on(old);
            }

            if (!justChecked("act:branch")) {
              console.log("No actionable checkbox transition");
              return;
            }

            const actor = context.payload.sender.login;
            const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });

            let slug = issue.data.title.toLowerCase()
              .replace(/[^\w\sก-๙-]/g, "").replace(/\s+/g, "-")
              .replace(/-+/g, "-").replace(/^-|-$/g, "").slice(0, 40) || "fix";
            const branchName = `task/${issueNumber}-${slug}`;
            const baseBranch = "dev";

            let created = false;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branchName}` });
              console.log(`⚠️ Branch ${branchName} already exists`);
            } catch (e) {
              if (e.status === 404) {
                const base = await github.rest.git.getRef({ owner, repo, ref: `heads/${baseBranch}` });
                await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branchName}`, sha: base.data.object.sha });
                created = true;
                console.log(`✅ Created ${branchName}`);
              } else throw e;
            }

            try { await github.rest.issues.addAssignees({ owner, repo, issue_number: issueNumber, assignees: [actor] }); } catch (e) {}
            for (const l of ["status:needs-triage", "status:ready"]) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: l }); } catch (e) {}
            }
            try { await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ["status:in-progress"] }); } catch (e) {}

            // Project V2 Status -> In Progress (best effort, needs PAT)
            if (process.env.PROJECT_PAT) {
              try {
                const pg = async (q, v = {}) => {
                  const r = await fetch("https://api.github.com/graphql", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${process.env.PROJECT_PAT}` },
                    body: JSON.stringify({ query: q, variables: v }),
                  });
                  const j = await r.json();
                  if (j.errors) throw new Error(j.errors.map(e => e.message).join("\n"));
                  return j.data;
                };
                const issNode = context.payload.issue.node_id;
                const pdata = await pg(`query{organization(login:"Libreserve"){projectV2(number:2){id fields(first:30){nodes{... on ProjectV2SingleSelectField{id name options{id name}}}}}}}`);
                const proj = pdata.organization.projectV2;
                const add = await pg(`mutation($p:ID!,$c:ID!){addProjectV2ItemById(input:{projectId:$p,contentId:$c}){item{id}}}`, { p: proj.id, c: issNode });
                const itemId = add.addProjectV2ItemById.item.id;
                const sf = proj.fields.nodes.find(f => f.name && f.name.toLowerCase() === "status");
                const opt = sf && sf.options.find(o => o.name.toLowerCase() === "in progress");
                if (opt) {
                  await pg(`mutation{updateProjectV2ItemFieldValue(input:{projectId:"${proj.id}",itemId:"${itemId}",fieldId:"${sf.id}",value:{singleSelectOptionId:"${opt.id}"}}){projectV2Item{id}}}`);
                  console.log("📋 Project Status -> In Progress");
                }
              } catch (e) { console.log(`⚠️ project status skip: ${e.message}`); }
            }

            const url = `https://github.com/${owner}/${repo}/tree/${branchName}`;
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: [
                `🌿 **Branch พร้อมแล้ว — [\`${branchName}\`](${url})**`,
                "",
                "```bash",
                "git fetch origin",
                `git switch ${branchName}`,
                "```",
                "",
                `> 👤 @${actor} · 🏷️ in-progress · commit ขึ้น branch นี้แล้วระบบเปิด **draft PR** ให้อัตโนมัติ`,
              ].join("\n"),
            });
            console.log(created ? "✅ Done (branch created)" : "✅ Done (branch existed)");
