name: Issue Triage Bot

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to re-triage"
        type: number
        required: true

permissions:
  issues: write
  contents: read
  repository-projects: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request }}

    steps:
      - name: Classify issue with Gemini + apply labels
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        with:
          script: |
            const { owner, repo } = context.repo;

            // Support both issue event and workflow_dispatch re-run
            let issueNumber, issueTitle, issueBody;
            if (context.payload.issue) {
              issueNumber = context.payload.issue.number;
              issueTitle = context.payload.issue.title;
              issueBody = context.payload.issue.body || "";
            } else if (context.payload.inputs?.issue_number) {
              issueNumber = parseInt(context.payload.inputs.issue_number, 10);
              const iss = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              issueTitle = iss.data.title;
              issueBody = iss.data.body || "";
            } else {
              console.log("❌ No issue context and no issue_number input");
              return;
            }

            const labelsToAdd = [];
            function addLabel(name) {
              if (!labelsToAdd.includes(name)) labelsToAdd.push(name);
            }

            // ═══════════════════════════════════════════
            // STEP 0: Duplicate detection
            // ═══════════════════════════════════════════
            let duplicateOf = null;

            if (process.env.GEMINI_API_KEY) {
              try {
                // Fetch ~30 most recent open issues (excluding self)
                const openIssues = await github.rest.issues.listForRepo({
                  owner, repo,
                  state: "open",
                  per_page: 30,
                  sort: "created",
                  direction: "desc",
                });

                const candidates = openIssues.data
                  .filter(iss => iss.number !== issueNumber && !iss.pull_request)
                  .map(iss => ({ number: iss.number, title: iss.title, body: (iss.body || "").slice(0, 500), url: iss.html_url }));

                if (candidates.length > 0) {
                  const dupCheckInstruction = [
                    'You are a duplicate detection bot. Compare the NEW issue against EXISTING issues.',
                    'Return JSON: { "is_duplicate": true/false, "duplicate_of": null or issue number, "confidence": "high"/"medium"/"low", "reason": short Thai explanation }',
                    'Only flag as duplicate if the SAME problem/request — not just same area. Be conservative.',
                  ].join('\n');

                  const candidateList = candidates.map(c => `#${c.number}: ${c.title}\n${c.body}`).join('\n\n---\n\n');

                  const dupResponse = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                    {
                      method: "POST",
                      headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({
                        system_instruction: { parts: [{ text: dupCheckInstruction }] },
                        contents: [{ parts: [{ text: `NEW ISSUE — #${issueNumber}: ${issueTitle}\n${issueBody.slice(0, 1000)}\n\nEXISTING OPEN ISSUES:\n${candidateList}` }] }],
                        generationConfig: {
                          response_mime_type: "application/json",
                          response_schema: {
                            type: "OBJECT",
                            properties: {
                              is_duplicate: { type: "BOOLEAN" },
                              duplicate_of: { type: "INTEGER", nullable: true },
                              confidence: { type: "STRING", enum: ["high","medium","low"] },
                              reason: { type: "STRING" },
                            },
                            required: ["is_duplicate","confidence","reason"]
                          },
                          temperature: 0.1,
                          maxOutputTokens: 300,
                        }
                      }),
                      signal: AbortSignal.timeout(15000),
                    }
                  );

                  if (dupResponse.ok) {
                    const dupData = await dupResponse.json();
                    const dupText = dupData?.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (dupText) {
                      const dupResult = JSON.parse(dupText);
                      console.log("🔍 Duplicate check:", JSON.stringify(dupResult, null, 2));
                      if (dupResult.is_duplicate && dupResult.duplicate_of) {
                        duplicateOf = dupResult;
                      }
                    }
                  }
                }
              } catch (err) {
                console.log(`⚠️ Duplicate check skipped: ${err.message}`);
              }
            }

            // If duplicate → label + comment + skip triage
            if (duplicateOf) {
              addLabel("duplicate");
              addLabel("status:needs-triage");

              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber, labels: labelsToAdd,
              });

              const dupUrl = `https://github.com/${owner}/${repo}/issues/${duplicateOf.duplicate_of}`;
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: [
                  `🔁 **Duplicate Detected** — ${duplicateOf.confidence} confidence`,
                  `• ซ้ำกับ [#${duplicateOf.duplicate_of}](${dupUrl})`,
                  `• ${duplicateOf.reason}`,
                  '',
                  'หากเป็นคนละ issue กัน สามารถตอบกลับมาได้ แล้ว label `duplicate` จะถูกนำออก',
                  '',
                  `> 🤖 ตรวจสอบโดย Gemini 2.5 Flash`,
                ].join('\n'),
              });

              console.log(`🔁 Marked as duplicate of #${duplicateOf.duplicate_of}`);
              return;
            }

            // ═══════════════════════════════════════════
            // STEP 1: Gemini API classification (primary)
            // ═══════════════════════════════════════════
            let triageResult = null;

            if (process.env.GEMINI_API_KEY) {
              try {
                const systemInstruction = [
                  'You are an issue triage bot for "Libreserve" — a Next.js room reservation web app (React 19 + App Router + Mantine UI + Redux Toolkit + SCSS modules, REST API backend, Docker + Kubernetes infra).',
                  '',
                  'Analyze the issue (may be Thai, English, or mixed). Return JSON:',
                  '- "type": "bug" | "feature" | "tech-debt" | "docs" | "question"',
                  '- "areas": array from ["frontend","api","auth","state","styles","infra","docs"] — pick ALL that apply',
                  '- "priority": "critical" | "high" | "medium" | "low"',
                  '- "needs_info": true if too vague / missing key details',
                  '- "needs_info_reason": short Thai reason if needs_info, otherwise null',
                  '- "summary": 1-sentence Thai summary',
                  '- "keywords": up to 5 key terms',
                  '- "effort": "small" | "medium" | "large" based on complexity',
                  '',
                  'Effort rules: small=<2hr (typo, CSS tweak, simple dep bump), medium=2-8hr (new component, API route, store logic), large=1d+ (new page, refactor, auth flow, integration). Default medium.',
                  '',
                  'Priority rules:',
                  '- critical: system broken, data loss, users cannot work',
                  '- high: core functionality broken, no workaround',
                  '- medium: partial breakage, workaround exists',
                  '- low: cosmetic, minor, nice-to-have',
                  '- Infer from tone/impact if no explicit severity.',
                  '',
                  'needs_info=true when: body very short (< ~30 words), no repro steps for bug, just a screenshot, unclear request.',
                  '',
                  'Areas: frontend=UI/pages/components, api=backend/data/network, auth=login/permissions, state=Redux/store/context, styles=CSS/design/theme, infra=CI/CD/deploy/docker/k8s, docs=documentation.',
                ].join('\n');

                const requestBody = {
                  system_instruction: { parts: [{ text: systemInstruction }] },
                  contents: [{ parts: [{ text: `TITLE: ${issueTitle}\n\nBODY:\n${issueBody}` }] }],
                  generationConfig: {
                    response_mime_type: "application/json",
                    response_schema: {
                      type: "OBJECT",
                      properties: {
                        type: { type: "STRING", enum: ["bug","feature","tech-debt","docs","question"] },
                        areas: { type: "ARRAY", items: { type: "STRING" } },
                        priority: { type: "STRING", enum: ["critical","high","medium","low"] },
                        needs_info: { type: "BOOLEAN" },
                        needs_info_reason: { type: "STRING", nullable: true },
                        summary: { type: "STRING" },
                        keywords: { type: "ARRAY", items: { type: "STRING" } },
                        effort: { type: "STRING", enum: ["small","medium","large"] },
                      },
                      required: ["type","areas","priority","needs_info","summary","keywords","effort"]
                    },
                    temperature: 0.1,
                    maxOutputTokens: 500,
                  }
                };

                const response = await fetch(
                  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                  {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody),
                    signal: AbortSignal.timeout(15000),
                  }
                );

                if (response.ok) {
                  const data = await response.json();
                  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                  if (text) {
                    triageResult = JSON.parse(text);
                    console.log("🤖 Gemini result:", JSON.stringify(triageResult, null, 2));
                  }
                } else {
                  console.log(`⚠️ Gemini API error ${response.status}`);
                }
              } catch (err) {
                console.log(`⚠️ Gemini failed, falling to keywords: ${err.message}`);
              }
            } else {
              console.log("⚠️ GEMINI_API_KEY not set — using keyword fallback");
            }

            // ═══════════════════════════════════════════
            // STEP 2: Keyword fallback
            // ═══════════════════════════════════════════
            if (!triageResult) {
              console.log("🔤 Running keyword fallback...");
              const text = (issueTitle + " " + issueBody).toLowerCase();
              function has(...words) { return words.some(w => text.includes(w)); }

              if (has("bug","error","crash","broken","พัง","ผิดพลาด","ไม่ทำงาน","bug"))
                triageResult = { type: "bug", areas: [], priority: "medium", effort: "medium", needs_info: false, needs_info_reason: null, summary: issueTitle, keywords: [] };
              else if (has("feature","enhancement","เพิ่ม","อยากให้","ขอ","เสนอ","ฟีเจอร์"))
                triageResult = { type: "feature", areas: [], priority: "medium", effort: "medium", needs_info: false, needs_info_reason: null, summary: issueTitle, keywords: [] };
              else if (has("refactor","cleanup","clean","improve","ปรับปรุง","technical debt"))
                triageResult = { type: "tech-debt", areas: [], priority: "medium", effort: "medium", needs_info: false, needs_info_reason: null, summary: issueTitle, keywords: [] };
              else if (has("docs","document","เอกสาร","readme","คู่มือ"))
                triageResult = { type: "docs", areas: [], priority: "low", effort: "small", needs_info: false, needs_info_reason: null, summary: issueTitle, keywords: [] };
              else
                triageResult = { type: "question", areas: [], priority: "medium", effort: "medium", needs_info: false, needs_info_reason: null, summary: issueTitle, keywords: [] };

              // areas
              if (has("ui","ux","หน้าตา","design","component","layout","css","style","แสดงผล","หน้าเว็บ","page","button","modal","card","table","form","input"))
                triageResult.areas.push("frontend");
              if (has("api","fetch","endpoint","backend","response","data","request","network","/api","status code"))
                triageResult.areas.push("api");
              if (has("login","auth","token","permission","role","password","รหัสผ่าน","เข้าสู่ระบบ","signin","signup","register"))
                triageResult.areas.push("auth");
              if (has("redux","store","context","state","dispatch","provider","hook","useState","useSelector"))
                triageResult.areas.push("state");
              if (has("deploy","docker","k8s","kubernetes","ci","cd","build","pipeline","workflow","infra","server"))
                triageResult.areas.push("infra");
              if (has("scss","css","style","theme","ธีม","สี","font","responsive","mobile"))
                triageResult.areas.push("styles");

              if ((issueBody || "").replace(/\s/g,"").length < 30) {
                triageResult.needs_info = true;
                triageResult.needs_info_reason = "เนื้อหา issue สั้นเกินไป ขอรายละเอียดเพิ่มเติม";
              }

              console.log("🔤 Keyword result:", JSON.stringify(triageResult, null, 2));
            }

            // ═══════════════════════════════════════════
            // STEP 2.5: Strip old status labels (re-run safety)
            // ═══════════════════════════════════════════
            const statusLabels = ["status:needs-triage","status:needs-info","status:ready","status:in-progress"];
            for (const sl of statusLabels) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: sl }); } catch (e) {}
            }

            // ═══════════════════════════════════════════
            // STEP 3: Map result to labels
            // ═══════════════════════════════════════════
            if (triageResult.type) addLabel(`type:${triageResult.type}`);
            if (triageResult.priority) addLabel(`priority:${triageResult.priority}`);
            if (triageResult.effort) addLabel(`effort:${triageResult.effort}`);

            for (const area of (triageResult.areas || [])) {
              const a = area.toLowerCase().trim();
              if (["frontend","api","auth","state","styles","infra","docs"].includes(a)) {
                addLabel(`area:${a}`);
              }
            }
            if (triageResult.needs_info) {
              addLabel("status:needs-info");
            } else if (triageResult.type) {
              // Gemini classified successfully → ready for dev
              addLabel("status:ready");
              // Remove needs-triage if it was carried over from template
              if (labelsToAdd.includes("status:needs-triage")) {
                labelsToAdd.splice(labelsToAdd.indexOf("status:needs-triage"), 1);
              }
            } else {
              // Fallback only → human review needed
              addLabel("status:needs-triage");
            }

            // ═══════════════════════════════════════════
            // STEP 4: Apply labels
            // ═══════════════════════════════════════════
            console.log(`🏷️  Applying: ${labelsToAdd.join(", ")}`);

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: labelsToAdd,
            });

            // ═══════════════════════════════════════════
            // STEP 5: Bot comment
            // ═══════════════════════════════════════════
            const areaEmoji = { frontend: "🖥️", api: "🔌", auth: "🔐", state: "🧩", styles: "🎨", infra: "⚙️", docs: "📚" };
            const priorityEmoji = { critical: "🔴", high: "🟠", medium: "🟡", low: "🟢" };
            const typeLabel = { bug: "🐛 Bug", feature: "💡 Feature", "tech-debt": "🔧 Tech Debt", docs: "📚 Docs", question: "❓ Question" };

            const effortLabel = { small: "⏱️ Small (< 2 ชม.)", medium: "⏱️ Medium (2-8 ชม.)", large: "⏱️ Large (1 วัน+)" };

            const areaStr = (triageResult.areas || []).length > 0
              ? (triageResult.areas || []).map(a => `${areaEmoji[a] || "📌"} ${a}`).join(", ")
              : "— ยังไม่ระบุ";

            let comment = `🤖 **AI Triage** — วิเคราะห์โดย Gemini 2.5 Flash\n`;
            comment += `• **ประเภท:** ${typeLabel[triageResult.type] || triageResult.type}\n`;
            comment += `• **บริเวณ:** ${areaStr}\n`;
            comment += `• **ความสำคัญ:** ${priorityEmoji[triageResult.priority] || ""} ${triageResult.priority || "medium"}\n`;
            comment += `• **ขนาดงาน:** ${effortLabel[triageResult.effort] || "⏱️ " + (triageResult.effort || "medium")}\n`;
            comment += `• **สรุป:** ${triageResult.summary || issueTitle}\n`;

            if (triageResult.needs_info) {
              comment += `\n⚠️ **ต้องการข้อมูลเพิ่มเติม:** ${triageResult.needs_info_reason || "กรุณาให้รายละเอียดเพิ่มเติม"}`;
              comment += `\n> 🙏 ช่วยตอบกลับด้วยข้อมูลเพิ่มเติม แล้วจะนำ label \`status:needs-info\` ออกให้`;
            }

            const baseUrl = `https://github.com/${owner}/${repo}`;
            comment += `\n\n---`;
            comment += `\n### ⚡ Actions`;
            comment += `\n| | |`;
            comment += `\n|---|---|`;
            comment += `\n| 🌿 [**Create Branch**](${baseUrl}/actions/workflows/create-branch.yml) | สร้าง branch \`task/${issueNumber}-...\` + assign คุณ + in-progress |`;
            comment += `\n| 🖊️ [**Edit Labels**](${baseUrl}/issues/${issueNumber}/labels) | แก้ไข label เองถ้า AI วิเคราะห์ผิด |`;
            comment += `\n\n> 🔍 ตรวจสอบโดย Gemini 2.5 Flash | หาก label ไม่ถูกต้องสามารถแก้ไขได้`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: comment,
            });

            console.log("✅ Triage complete");

            // ═══════════════════════════════════════════
            // STEP 6: Sync to Project V2
            // ═══════════════════════════════════════════
            if (!process.env.PROJECT_PAT) {
              console.log("⏭️ PROJECT_PAT not set — skipping Project V2 sync");
            } else {
              try {
              // Get issue node ID
              let issueNodeId;
              if (context.payload.issue?.node_id) {
                issueNodeId = context.payload.issue.node_id;
              } else {
                const issData = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                issueNodeId = issData.data.node_id;
              }

              const orgName = "Libreserve";
              const projectNumber = 2;

              // Helper for authenticated GraphQL calls (PAT for project scope)
              async function projectGraphql(query, vars = {}) {
                const resp = await fetch("https://api.github.com/graphql", {
                  method: "POST",
                  headers: { "Content-Type": "application/json", Authorization: `Bearer ${process.env.PROJECT_PAT}` },
                  body: JSON.stringify({ query, variables: vars }),
                });
                const json = await resp.json();
                if (json.errors) throw new Error(json.errors.map(e => e.message).join("\n"));
                return json.data;
              }

              // Query project metadata
              const projResp = await projectGraphql(`
                query {
                  organization(login: "${orgName}") {
                    projectV2(number: ${projectNumber}) {
                      id
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2Field { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                          ... on ProjectV2IterationField { id name }
                        }
                      }
                    }
                  }
                }
              `);

              const project = projResp.organization.projectV2;
              const projectId = project.id;
              console.log(`📂 Project fields:`, JSON.stringify(project.fields.nodes.map(f => ({name: f.name, options: f.options?.map(o => o.name) || null}))));

              // Build field lookup by name (case-insensitive)
              const fieldMap = {};
              for (const f of project.fields.nodes) {
                if (f.options) {
                  fieldMap[f.name.toLowerCase()] = {
                    id: f.id,
                    options: Object.fromEntries(f.options.map(o => [o.name.toLowerCase(), o.id]))
                  };
                } else {
                  fieldMap[f.name.toLowerCase()] = { id: f.id };
                }
              }

              // Add issue to project
              const addResp = await projectGraphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `, { projectId, contentId: issueNodeId });
              const itemId = addResp.addProjectV2ItemById.item.id;
              console.log(`📋 Added to project V2: item ${itemId}`);

              // Prepare field updates
              const fieldUpdates = [];

              // Priority
              const priField = fieldMap["priority"];
              if (priField && triageResult.priority) {
                const optId = priField.options[triageResult.priority.toLowerCase()];
                if (optId) {
                  fieldUpdates.push(
                    `updateProjectV2ItemFieldValue(input: {projectId: "${projectId}", itemId: "${itemId}", fieldId: "${priField.id}", value: {singleSelectOptionId: "${optId}"}}) { projectV2Item { id } }`
                  );
                }
              }

              // Effort
              const effField = fieldMap["effort"];
              if (effField && triageResult.effort) {
                const optId = effField.options[triageResult.effort.toLowerCase()];
                if (optId) {
                  fieldUpdates.push(
                    `updateProjectV2ItemFieldValue(input: {projectId: "${projectId}", itemId: "${itemId}", fieldId: "${effField.id}", value: {singleSelectOptionId: "${optId}"}}) { projectV2Item { id } }`
                  );
                }
              }

              // Area (take first area)
              const areaField = fieldMap["area"];
              if (areaField && triageResult.areas && triageResult.areas.length > 0) {
                const optId = areaField.options[triageResult.areas[0].toLowerCase()];
                if (optId) {
                  fieldUpdates.push(
                    `updateProjectV2ItemFieldValue(input: {projectId: "${projectId}", itemId: "${itemId}", fieldId: "${areaField.id}", value: {singleSelectOptionId: "${optId}"}}) { projectV2Item { id } }`
                  );
                }
              }

              // Status
              const statusField = fieldMap["status"];
              if (statusField) {
                let statusName = "ready";
                if (triageResult.needs_info) statusName = "needs info";
                else if (!triageResult.type) statusName = "needs triage";
                const optId = statusField.options[statusName.toLowerCase()];
                if (optId) {
                  fieldUpdates.push(
                    `updateProjectV2ItemFieldValue(input: {projectId: "${projectId}", itemId: "${itemId}", fieldId: "${statusField.id}", value: {singleSelectOptionId: "${optId}"}}) { projectV2Item { id } }`
                  );
                }
              }

              // Execute field updates in parallel
              if (fieldUpdates.length > 0) {
                // Can't batch mutations easily, run sequentially
                for (const mu of fieldUpdates) {
                  await projectGraphql(`mutation { ${mu} }`);
                }
                console.log(`✅ Synced ${fieldUpdates.length} fields to project`);
              }

              // Set Issue Type (separate from project fields)
              const typeMap = { bug: "Bug", feature: "Feature", "tech-debt": "Task", docs: "Task", question: "Task" };
              const issueTypeName = typeMap[triageResult.type];
              if (issueTypeName) {
                // Query all repo issue types to find our one
                const typeResp = await github.graphql(`
                  query {
                    repository(owner: "${owner}", name: "${repo}") {
                      issueTypes(first: 10) { nodes { id name } }
                    }
                  }
                `);
                const issueType = typeResp.repository.issueTypes.nodes.find(t => t.name === issueTypeName);
                if (issueType) {
                  await github.graphql(`
                    mutation($issueId: ID!, $typeId: ID!) {
                      updateIssue(input: {id: $issueId, issueTypeId: $typeId}) {
                        issue { id number }
                      }
                    }
                  `, { issueId: issueNodeId, typeId: issueType.id });
                  console.log(`🏷️ Set Issue Type: ${issueTypeName}`);
                }
              }
            } catch (err) {
              console.log(`⚠️ Project V2 sync skipped: ${err.message}`);
            }
            }
